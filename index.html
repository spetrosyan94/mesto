<!DOCTYPE html>
<html lang="ru">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="./pages/index.css">
  <title>Mesto</title>
</head>

<body class="page">

  <header class="header">
    <img class="header__logo logo" src="./images/header-logo.svg" alt="логотип mesto">
    <div class="header__line"></div>
  </header>

  <main class="content">

    <div class="profile">
      <div class="profile__info">
        <img class="profile__avatar" src="./images/profile-avatar.png" alt="изображение аватара автора">
        <div class="profile__text">
          <h1 class="profile__author">Жак-Ив Кусто</h1>
          <p class="profile__subtitle">Исследователь океана</p>
        </div>
        <input class="profile__edit-button" type="submit" value=""></input>
      </div>
      <input class="profile__add-button" type="submit" value=""></input>
    </div>

    <div class="popup">
      <form class="popup__form" method="get" name="popupform">
        <h2 class="popup__title">Редактировать профиль</h2>
        <input class="popup__input popup__input_type_name" name="popup-name" type="text">
        <input class="popup__input popup__input_type_job" name="popup-job" type="text">
        <button class="popup__submit-btn" type="submit">Сохранить</button>
        <button class="popup__close-btn" type="submit"></button>
      </form>
    </div>

    <div class="elements">
      <ul class="elements__card-list">
        <li class="elements__card">
          <img class="elements__image" src="./images/elementst-karachaevsk.png" alt="фото карачаевска">
          <div class="elements__item-container">
            <p class="elements__text">Карачаевск</p>
            <button class="elements__like-btn"></button>
          </div>
        </li>

        <li class="elements__card">
          <img class="elements__image" src="./images/elementst-elbrus-1.png" alt="фото горы эльбрус">
          <div class="elements__item-container">
            <p class="elements__text">Гора Эльбрус</p>
            <button class="elements__like-btn"></button>
          </div>
        </li>

        <li class="elements__card">
          <img class="elements__image" src="./images/elementst-dombai.png" alt="фото домбаи">
          <div class="elements__item-container">
            <p class="elements__text">Домбай</p>
            <button class="elements__like-btn"></button>
          </div>
        </li>

        <li class="elements__card">
          <img class="elements__image" src="./images/elementst-elbrus-2.jpg" alt="фото горы эльбрус">
          <div class="elements__item-container">
            <p class="elements__text">Гора Эльбрус</p>
            <button class="elements__like-btn"></button>
          </div>
        </li>

        <li class="elements__card">
          <img class="elements__image" src="./images/elementst-karachaevo-cherkesskaya resp.jpg"
            alt="фото карачаево-черкесской республики">
          <div class="elements__item-container">
            <p class="elements__text">Карачаево-Черкесская Республика</p>
            <button class="elements__like-btn"></button>
          </div>
        </li>

        <li class="elements__card">
          <img class="elements__image" src="./images/elementst-mys-ostriy.jpg" alt="фото мыс острый">
          <div class="elements__item-container">
            <p class="elements__text">Мыс Острый</p>
            <button class="elements__like-btn"></button>
          </div>
        </li>

      </ul>
    </div>

    <footer class="footer">
      <p class="footer__copyright">© 2023. Петросян Сергей</p>
    </footer>

  </main>

  <script src="index.js"></script>
</body>

</html>
